# ==========================================================
# CD - Build, Push & Deploy (Spring Boot + Maven)
# Copy this file to your project's .github/workflows/cd.yml
# Replace placeholder values (<...>) with your actual config
#
# Required GitHub Secrets:
#   DOCKERHUB_USERNAME  - Docker Hub username
#   DOCKERHUB_TOKEN     - Docker Hub Access Token (NOT password)
#   VPS_HOST            - VPS IP or hostname
#   VPS_USERNAME        - SSH user (e.g. root)
#   VPS_SSH_KEY         - Private SSH key for VPS access
# ==========================================================

name: CD - Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: "17"                       # <-- adjust to your Java version
          distribution: "temurin"
          cache: "maven"

      - name: Build with Maven
        run: mvn clean package -DskipTests

      # --- Docker Build & Push ---
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}   # use Access Token, not password

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            <your-dockerhub-username>/<your-app-name>:latest
            <your-dockerhub-username>/<your-app-name>:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # --- Deploy to VPS ---
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd ~/vps-config/projects/<your-project-name>
            docker-compose pull app
            docker-compose up -d --force-recreate app

      - name: Health check
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            sleep 10
            docker inspect --format='{{.State.Health.Status}}' <your-app-container-name> 2>/dev/null || \
            docker inspect --format='{{.State.Status}}' <your-app-container-name>

      # --- Cleanup ---
      - name: Clean up old Docker images
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            docker image prune -af --filter "until=48h"
