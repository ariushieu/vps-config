# ==========================================================
# Docker Compose - Spring Boot + MySQL (Example Template)
# Replace placeholder values (<...>) with your actual config
# Copy .env.example to .env and fill in real credentials
#
# Note: App port will be auto-assigned during deploy_project.sh
# ==========================================================

services:
  app:
    image: <your-dockerhub-username>/<your-app-name>:latest  # e.g. ariushieu/mini-social-be:latest
    container_name: <your-app-container-name>                 # e.g. isocial-app
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:8080"                                # auto-assigned by deploy_project.sh
    environment:
      TZ: ${TZ:-UTC}                                         # JVM + system clock inside container
    env_file:
      - .env
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - backend-network
    mem_limit: 512m
    cpus: 1.0
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  mysql:
    image: mysql:8.0
    container_name: <your-db-container-name>                  # e.g. isocial-mysql
    restart: unless-stopped
    command: --default-time-zone=${MYSQL_TZ_OFFSET:-+00:00}   # pin MySQL session tz (matches TZ above)
    environment:
      TZ: ${TZ:-UTC}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - /opt/data/<your-project-name>/mysql:/var/lib/mysql    # e.g. /opt/data/mini-social-be/mysql
    ports:
      - "127.0.0.1:3306:3306"                                # loopback only — never expose DB to internet
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend-network
    mem_limit: 512m
    cpus: 0.5
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

networks:
  backend-network:
    external: true
