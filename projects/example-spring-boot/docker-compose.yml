# ==========================================================
# Docker Compose - Example Template
# Replace placeholder values (<...>) with your actual config
# Copy .env.example to .env and fill in real credentials
# ==========================================================

version: "3.8"

services:
  app:
    image: <your-dockerhub-username>/<your-app-name>:latest  # e.g. ariushieu/mini-social-be:latest
    container_name: <your-app-container-name>                 # e.g. isocial-app
    restart: unless-stopped
    ports:
      - "8080:8080"
    env_file:
      - .env
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - backend-network

  mysql:
    image: mysql:8.0
    container_name: <your-db-container-name>                  # e.g. isocial-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - /opt/data/<your-project-name>/mysql:/var/lib/mysql    # e.g. /opt/data/mini-social-be/mysql
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend-network

networks:
  backend-network:
    external: true
