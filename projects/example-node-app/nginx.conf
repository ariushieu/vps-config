# ==========================================================
# Nginx Reverse Proxy Configuration (Example Template)
# Replace ALL <your-domain.com> with your actual domain
# Then run: sudo certbot --nginx -d your-domain.com
# ==========================================================

# Rate limiting zone (10 requests/sec per IP, burst 20)
limit_req_zone $binary_remote_addr zone=app_limit:10m rate=10r/s;

server {
    server_name <your-domain.com>;

    # --- Security Headers ---
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    # Uncomment after SSL is stable:
    # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # --- General ---
    server_tokens off;
    client_max_body_size 10M;

    location / {
        limit_req zone=app_limit burst=20 nodelay;

        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support (if needed)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Timeout settings
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/<your-domain.com>/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/<your-domain.com>/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot

}

server {
    if ($host = <your-domain.com>) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    listen 80;
    server_name <your-domain.com>;
    return 404; # managed by Certbot


}
