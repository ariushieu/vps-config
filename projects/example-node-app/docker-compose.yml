# ==========================================================
# Docker Compose - Node.js + MongoDB (Example Template)
# Replace placeholder values (<...>) with your actual config
# Copy .env.example to .env and fill in real credentials
# ==========================================================

version: "3.8"

services:
  app:
    image: <your-dockerhub-username>/<your-app-name>:latest
    container_name: <your-app-container-name>
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"                                   # loopback only — Nginx proxies from outside
    env_file:
      - .env
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - backend-network
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'

  mongo:
    image: mongo:7
    container_name: <your-db-container-name>
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}
      MONGO_INITDB_DATABASE: ${MONGO_DATABASE}
    volumes:
      - /opt/data/<your-project-name>/mongo:/data/db          # e.g. /opt/data/my-api/mongo
    ports:
      - "127.0.0.1:27017:27017"                                 # loopback only — never expose DB to internet
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend-network
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'

networks:
  backend-network:
    external: true
